name: Docker Mirror

on:
  workflow_dispatch:
    inputs:
      images:
        description: '要拉取的镜像名（多个用逗号分隔，如: node:20,alpine:latest,nginx:alpine）'
        required: true
        default: 'mysql:8.0'
      target_registry:
        description: '目标仓库（ghcr.io/你的用户名）'
        required: true
        default: 'ghcr.io/whitebear-wpl'

env:
  IMAGES: ${{ github.event.inputs.images }}
  TARGET_REGISTRY: ${{ github.event.inputs.target_registry }}
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
  ALIYUN_NAMESPACE: workorder

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录到阿里云
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: 拉取并推送镜像（双推）
        run: |
          IFS=',' read -ra IMAGE_LIST <<< "$IMAGES"
          for IMG in "${IMAGE_LIST[@]}"; do
            IMG=$(echo "$IMG" | xargs)
            echo "===== 正在处理: $IMG ====="
            
            docker pull "docker.io/$IMG"
            
            # 推送到 ghcr.io
            GHCR_IMG="$TARGET_REGISTRY/${IMG}"
            docker tag "docker.io/$IMG" "$GHCR_IMG"
            docker push "$GHCR_IMG"
            echo "✅ $IMG -> $GHCR_IMG 完成"

            # 推送到阿里云
            ALIYUN_IMG="$ALIYUN_REGISTRY/$ALIYUN_NAMESPACE/${IMG%:*}:${IMG#*:}"
            if [ "$IMG" = "${IMG%:*}" ]; then
              ALIYUN_IMG="$ALIYUN_REGISTRY/$ALIYUN_NAMESPACE/${IMG%:*}:latest"
            fi
            docker tag "docker.io/$IMG" "$ALIYUN_IMG"
            docker push "$ALIYUN_IMG"
            echo "✅ $IMG -> $ALIYUN_IMG 完成"
          done
